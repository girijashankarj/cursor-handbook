name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate Components
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate structure
        run: |
          chmod +x scripts/validate.sh
          ./scripts/validate.sh

      - name: Validate JSON files
        run: |
          echo "Validating JSON files..."
          ERRORS=0
          for f in $(find . -name "*.json" -not -path "*/node_modules/*"); do
            if ! python3 -m json.tool "$f" > /dev/null 2>&1; then
              echo "ERROR: Invalid JSON: $f"
              ERRORS=$((ERRORS + 1))
            fi
          done
          if [ "$ERRORS" -gt 0 ]; then
            echo "Found $ERRORS invalid JSON file(s)"
            exit 1
          fi

      - name: Count components
        run: |
          RULES=$(find .cursor/rules \( -name "*.mdc" -o -name "*.md" \) | wc -l | tr -d ' ')
          AGENTS=$(find .cursor/agents -maxdepth 1 -name "*.md" | wc -l | tr -d ' ')
          SKILLS=$(find .cursor/skills -name "SKILL.md" | wc -l | tr -d ' ')
          COMMANDS=$(find .cursor/commands -name "*.md" ! -name "COMMAND_TEMPLATE.md" | wc -l | tr -d ' ')
          HOOKS=$(find .cursor/hooks -name "*.sh" | wc -l | tr -d ' ')
          echo "Rules: $RULES | Agents: $AGENTS | Skills: $SKILLS | Commands: $COMMANDS | Hooks: $HOOKS"
          echo "Total: $((RULES + AGENTS + SKILLS + COMMANDS + HOOKS))"

      - name: Check for secrets
        run: |
          echo "Checking for potential secrets..."
          # Check for AWS keys
          if grep -rE "AKIA[A-Z0-9]{16}" --include="*.md" --include="*.mdc" --include="*.json" --include="*.sh" .; then
            echo "ERROR: AWS key pattern found!"
            exit 1
          fi
          echo "No secrets found."

      - name: Validate shell scripts
        run: |
          echo "Checking shell scripts..."
          ERRORS=0
          for f in .cursor/hooks/*.sh; do
            if ! bash -n "$f"; then
              echo "ERROR: Syntax error in: $f"
              ERRORS=$((ERRORS + 1))
            fi
          done
          if [ "$ERRORS" -gt 0 ]; then
            echo "Found $ERRORS shell script(s) with syntax errors"
            exit 1
          fi

      - name: Verify COMPONENT_INDEX matches filesystem
        run: |
          chmod +x scripts/generate-component-index.sh
          ./scripts/generate-component-index.sh

  handbook-site:
    name: Build handbook site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install and build website
        run: |
          cd website
          npm ci
          npm run build
