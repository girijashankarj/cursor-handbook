# Build and deploy the static handbook UI to GitHub Pages.
# After the first successful run, enable Pages: Settings → Pages → Source: GitHub Actions.

name: Deploy handbook site

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install and build
        env:
          # So GitHub links in the built site match this fork (avoids 404 on wrong owner/repo).
          CURSOR_HANDBOOK_GITHUB_REPO: ${{ github.repository }}
          CURSOR_HANDBOOK_GITHUB_BRANCH: ${{ github.ref_name }}
          # Build base path for project pages (fork/repo-name safe).
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          # Canonical + Open Graph base URL for this Pages deployment.
          VITE_SITE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: |
          cd website
          npm ci
          npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
